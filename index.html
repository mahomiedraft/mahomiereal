<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mahomies Graphics</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#0b0b0b;
color:white;
padding:50px;
}

.title{
font-size:52px;
font-weight:900;
color:#ffb100;
margin-bottom:40px;
}

.cards{

display:flex;
flex-direction:column;

gap:35px;

max-width:900px;

}

.card{

background:#121212;

border-radius:24px;

padding:25px;

display:flex;

gap:30px;

align-items:center;

border:1px solid #222;

transition:.3s;

}

.card:hover{

transform:translateY(-4px);

border-color:#ffb100;

}

.card img{

width:320px;

border-radius:20px;

}

.info{

flex:1;

}

.info h2{

font-size:36px;

margin-bottom:15px;

color:white;

}

.info h3{

font-size:24px;

margin-bottom:15px;

color:#ffb100;

}

.info p{

color:#bdbdbd;

line-height:1.7;

font-size:17px;

}

@media(max-width:800px){

.card{

flex-direction:column;

text-align:center;

}

.card img{

width:100%;

}

}

</style>

</head>

<body>

<h1 class="title">

RAX CARD OPTIONS

</h1>

<div class="cards">

<div class="card">

<img src="teamlogos.png">

<div class="info">

<h2>Team Logos</h2>

<h3>50 RAX</h3>

<p>

Sports logos

Stadium designs

Simple collectible style cards

</p>

</div>

</div>

<div class="card">

<img src="logoplayer.png">

<div class="info">

<h2>Logo + Player ⭐</h2>

<h3>150 RAX</h3>

<p>

Player renders

Premium sports edits

Featured athlete cards

</p>

</div>

</div>

<div class="card">

<img src="headshot.png">

<div class="info">

<h2>In-Game Headshot</h2>

<h3>50 RAX</h3>

<p>

Roblox avatars

NPC portraits

Custom profile graphics

</p>

</div>

</div>

</div>

</body>
</html>
